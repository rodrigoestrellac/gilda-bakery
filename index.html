<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gilda Bakery — ¿Cuánto gano?</title>
<link rel="stylesheet" href="design/tokens.css">
<link rel="stylesheet" href="design/components.css">
<style>
  /* ── Layout app ────────────────────────────────────────────────────────── */
  html, body { margin: 0; min-height: 100vh; }
  body { background: var(--md-sys-color-background); color: var(--md-sys-color-on-surface); }

  .app { min-height: 100vh; display: flex; flex-direction: column; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .content {
    flex: 1; padding: 12px 16px 112px; max-width: 640px; width: 100%;
    margin: 0 auto;
  }

  /* Navegación: bar abajo en mobile, rail a la izquierda en desktop */
  .md-nav-rail { display: none; }
  .md-nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    padding-bottom: env(safe-area-inset-bottom);
    box-shadow: var(--md-sys-elevation-level2);
  }
  .nav-item { cursor: pointer; }

  @media (min-width: 1024px) {
    .app { flex-direction: row; }
    .md-nav-rail {
      display: flex; position: sticky; top: 0; height: 100vh;
      border-right: 1px solid var(--md-sys-color-outline-variant);
      padding-top: 20px;
    }
    .md-nav-bar { display: none; }
    .content { padding: 16px 40px 40px; max-width: 800px; }
  }

  /* ── Brand en el top app bar ───────────────────────────────────────────── */
  .md-top-app-bar { justify-content: center; padding: 12px 16px 8px; }
  .brand {
    display: inline-flex; align-items: center; gap: 12px;
    text-align: center; margin: 0; padding: 0;
    font-family: var(--md-sys-typescale-display-font);
    color: var(--md-sys-color-primary);
    font-size: 30px; line-height: 1.1; font-weight: 400;
  }
  .brand__logo {
    width: 48px; height: 48px;
    object-fit: contain;
  }
  .brand .bakery {
    display: inline-block; margin-left: 6px;
    font-family: var(--md-sys-typescale-title-font);
    font-weight: 700; font-size: 16px;
    color: var(--md-sys-color-on-surface);
    letter-spacing: 1.5px; text-transform: uppercase;
    vertical-align: middle;
  }
  .tagline {
    text-align: center; margin: 0 0 16px;
    color: var(--md-sys-color-on-surface-variant);
    font-size: 14px;
  }
  .rail-brand {
    font-family: var(--md-sys-typescale-display-font);
    color: var(--md-sys-color-primary);
    font-size: 32px; line-height: 1; text-align: center;
    margin-bottom: 8px;
  }

  /* ── Listas (recetas / insumos) ────────────────────────────────────────── */
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .add-bar { margin: 0 0 14px; }
  .add-bar .md-button { width: 100%; }
  @media (min-width: 600px) {
    .add-bar { display: flex; justify-content: flex-end; }
    .add-bar .md-button { width: auto; }
  }

  .item-card {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 14px 16px;
    background: var(--md-sys-color-surface-container-low);
    border: 1px solid var(--md-sys-color-outline-variant);
    border-radius: var(--md-sys-shape-corner-medium);
    color: inherit; font: inherit; text-align: left;
    cursor: pointer;
    transition: background-color var(--md-sys-motion-duration-short3),
                box-shadow var(--md-sys-motion-duration-short3);
    -webkit-tap-highlight-color: transparent;
  }
  .item-card:hover { background: var(--md-sys-color-surface-container); box-shadow: var(--md-sys-elevation-level1); }
  .item-card__info { flex: 1; min-width: 0; }
  .item-card__name {
    font-family: var(--md-sys-typescale-title-font);
    font-size: 16px; font-weight: 700;
    color: var(--md-sys-color-on-surface);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .item-card__sub {
    font-size: 13px; color: var(--md-sys-color-on-surface-variant);
    margin-top: 2px;
  }

  /* ── Tabla Productos (costo vs venta por unidad) ───────────────────────── */
  .prod-tbl-wrap {
    background: var(--md-sys-color-surface-container-low);
    border: 1px solid var(--md-sys-color-outline-variant);
    border-radius: var(--md-sys-shape-corner-medium);
    overflow-x: auto;
  }
  .prod-tbl {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--md-sys-typescale-body-font);
  }
  .prod-tbl th, .prod-tbl td {
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--md-sys-color-outline-variant);
  }
  .prod-tbl th {
    font-size: 12px; font-weight: 700;
    color: var(--md-sys-color-on-surface-variant);
    text-transform: uppercase; letter-spacing: 0.6px;
    background: var(--md-sys-color-surface-container);
    position: sticky; top: var(--th-sticky, 0);
    z-index: 2;
  }
  .prod-tbl tbody tr {
    cursor: pointer;
    transition: background-color var(--md-sys-motion-duration-short3);
  }
  .prod-tbl tbody tr:hover {
    background: var(--md-sys-color-surface-container);
  }
  .prod-tbl tbody tr:last-child td { border-bottom: 0; }
  .prod-tbl .num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    color: var(--md-sys-color-on-surface);
    white-space: nowrap;
  }
  .prod-tbl__name {
    font-family: var(--md-sys-typescale-title-font);
    font-size: 15px; font-weight: 700;
    color: var(--md-sys-color-on-surface);
  }
  .prod-tbl__unit {
    font-size: 12px; color: var(--md-sys-color-on-surface-variant);
    margin-top: 2px;
  }

  /* ── Switch row (label + toggle alineados) ─────────────────────────────── */
  .switch-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; margin: 0 0 14px;
    background: var(--md-sys-color-surface-container);
    border-radius: var(--md-sys-shape-corner-small);
  }
  .switch-row__label {
    font-family: var(--md-sys-typescale-body-font);
    font-size: 15px; font-weight: 600;
    color: var(--md-sys-color-on-surface);
  }

  /* ── Sección con título corto ──────────────────────────────────────────── */
  .section-title {
    margin: 16px 0 8px;
    font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--md-sys-color-on-surface-variant);
  }

  /* ── Pedido item row (producto + cant + precio + quitar) ───────────────── */
  .pedido-item-row {
    display: grid;
    grid-template-columns: 2fr 70px 1fr 36px;
    gap: 8px; align-items: center;
    margin-bottom: 8px;
  }
  .pedido-item-row__precio {
    position: relative; display: flex; align-items: center;
  }
  .pedido-item-row__prefix {
    position: absolute; left: 8px;
    font-weight: 700; color: var(--md-sys-color-on-surface-variant);
    pointer-events: none;
  }
  .pedido-item-row__precio .input-tight { padding-left: 22px; }

  /* ── Stock card ─────────────────────────────────────────────────────────── */
  .stock-card {
    padding: 14px 16px;
    background: var(--md-sys-color-surface-container-low);
    border: 1px solid var(--md-sys-color-outline-variant);
    border-radius: var(--md-sys-shape-corner-medium);
    display: flex; flex-direction: column; gap: 12px;
  }
  .stock-card__top {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }
  .stock-card__info { flex: 1; min-width: 0; }
  .stock-card__big {
    font-family: var(--md-sys-typescale-display-font);
    font-size: 32px; font-weight: 700;
    color: var(--md-sys-color-primary);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .stock-card__big small {
    font-size: 14px; font-weight: 700;
    color: var(--md-sys-color-on-surface-variant);
    text-transform: uppercase; letter-spacing: 0.6px;
  }
  .stock-card__actions {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap;
  }
  .stock-card__input {
    width: 80px; text-align: center;
    font-weight: 700; font-size: 16px;
  }

  /* ── Pedido card ────────────────────────────────────────────────────────── */
  .pedido-card {
    display: flex; flex-direction: column; align-items: stretch; gap: 8px;
    padding: 14px 16px;
  }
  .pedido-card__head {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
  }
  .pedido-card__cliente {
    font-family: var(--md-sys-typescale-title-font);
    font-size: 16px; font-weight: 700;
    color: var(--md-sys-color-on-surface);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 0;
  }
  .pedido-card__meta {
    display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end;
  }
  .pedido-card__fecha {
    font-size: 13px; color: var(--md-sys-color-on-surface-variant);
    font-weight: 600;
    display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .pedido-card__wa {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    background: #25D366; color: white;
    border-radius: 999px;
    text-decoration: none;
    font-size: 12px; font-weight: 700;
    transition: filter var(--md-sys-motion-duration-short3);
  }
  .pedido-card__wa:hover { filter: brightness(0.92); }
  .pedido-card__wa svg { display: block; }
  .pedido-tbl__wa {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px;
    background: #25D366; color: white;
    border-radius: 50%; text-decoration: none;
    transition: filter var(--md-sys-motion-duration-short3);
  }
  .pedido-tbl__wa:hover { filter: brightness(0.92); }
  .pedido-tbl__wa svg { display: block; }

  /* ── Pedido list card ──────────────────────────────────────────────────── */
  .pedidos-cards-wrap { display: flex; flex-direction: column; gap: 10px; }
  .pedido-list-card {
    display: flex; flex-direction: column; gap: 10px;
    width: 100%; padding: 14px 16px;
    background: var(--md-sys-color-surface-container-low);
    border: 1px solid var(--md-sys-color-outline-variant);
    border-radius: var(--md-sys-shape-corner-medium);
    cursor: pointer;
    transition: background-color var(--md-sys-motion-duration-short3),
                box-shadow var(--md-sys-motion-duration-short3);
    -webkit-tap-highlight-color: transparent;
  }
  .pedido-list-card:hover { background: var(--md-sys-color-surface-container); box-shadow: var(--md-sys-elevation-level1); }
  .pedido-list-card__top {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .pedido-list-card__cliente {
    font-family: var(--md-sys-typescale-title-font);
    font-size: 16px; font-weight: 700;
    color: var(--md-sys-color-on-surface);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 0;
  }
  .pedido-list-card__fecha {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600;
    color: var(--md-sys-color-on-surface-variant);
  }
  .pedido-list-card__fecha .material-symbols-rounded { font-size: 18px; }
  .pedido-list-card__chips {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .pedido-list-card__items {
    font-size: 13px; color: var(--md-sys-color-on-surface);
  }
  .pedido-card__items {
    margin: 0; padding-left: 20px;
    font-size: 13px; color: var(--md-sys-color-on-surface);
  }
  .pedido-card__items li { margin: 2px 0; }
  .pedido-card__notas {
    font-size: 12px; color: var(--md-sys-color-on-surface-variant);
    font-style: italic;
    padding: 6px 10px;
    background: var(--md-sys-color-surface);
    border-radius: var(--md-sys-shape-corner-small);
  }

  /* ── Empty state ───────────────────────────────────────────────────────── */
  .empty {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 48px 24px; text-align: center;
    color: var(--md-sys-color-on-surface-variant);
  }
  .empty .material-symbols-rounded { font-size: 64px; opacity: 0.5; margin-bottom: 4px; }
  .empty .empty-title {
    font-family: var(--md-sys-typescale-title-font);
    font-weight: 700; font-size: 17px;
    color: var(--md-sys-color-on-surface);
  }
  .empty small { font-size: 13px; }

  /* ── Sección dentro de card ────────────────────────────────────────────── */
  .md-card.section { padding: 18px 18px; margin-bottom: 12px; }
  .section-title {
    font-family: var(--md-sys-typescale-title-font);
    font-size: var(--md-sys-typescale-title-large-size);
    line-height: var(--md-sys-typescale-title-large-line-height);
    font-weight: 700;
    color: var(--md-sys-color-primary);
    margin: 0 0 14px;
  }

  /* ── Form fields ───────────────────────────────────────────────────────── */
  .field { margin-bottom: 14px; }
  /* Cuando hay prefijo "$", el label en estado bajo arranca después del prefijo */
  .md-text-field.with-prefix .md-text-field__label { left: 32px; }
  .md-text-field.with-prefix .md-text-field__input:focus + .md-text-field__label,
  .md-text-field.with-prefix .md-text-field__input:not(:placeholder-shown) + .md-text-field__label { left: 16px; }
  /* Prefijo "$": baseline alineado con el VALOR del input (top: 24px). */
  .md-text-field.with-prefix .md-text-field__prefix {
    top: 24px; bottom: auto; transform: none;
    line-height: var(--md-sys-typescale-body-large-line-height);
    font-size: var(--md-sys-typescale-body-large-size);
    transition: top var(--md-sys-motion-duration-short3) var(--md-sys-motion-easing-standard);
  }
  /* Cuando el input está vacío (placeholder visible), el $ sube para acompañar al label/placeholder */
  .md-text-field.with-prefix:has(.md-text-field__input:placeholder-shown:not(:focus)) .md-text-field__prefix {
    top: 18px;
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .label-line {
    display: block; font-family: var(--md-sys-typescale-label-font);
    font-weight: 700; font-size: 13px;
    color: var(--md-sys-color-on-surface-variant);
    margin-bottom: 6px;
  }
  .hint {
    font-size: 12px; color: var(--md-sys-color-on-surface-variant);
    margin: 6px 0 0;
  }

  /* Inputs compactos para filas tabulares (ingredientes) */
  .input-tight, .select-tight {
    width: 100%; height: 44px;
    padding: 0 12px;
    font-family: var(--md-sys-typescale-body-font); font-size: 14px;
    color: var(--md-sys-color-on-surface);
    background: var(--md-sys-color-surface-container-highest);
    border: none; border-bottom: 1px solid var(--md-sys-color-on-surface-variant);
    border-radius: var(--md-sys-shape-corner-extra-small) var(--md-sys-shape-corner-extra-small) 0 0;
    outline: none;
    appearance: none; -webkit-appearance: none;
    transition: border-color var(--md-sys-motion-duration-short3);
  }
  .input-tight:focus, .select-tight:focus { border-bottom: 2px solid var(--md-sys-color-primary); padding-bottom: 0; }
  .select-tight { padding-right: 28px; background-image: linear-gradient(45deg, transparent 50%, var(--md-sys-color-on-surface-variant) 50%), linear-gradient(135deg, var(--md-sys-color-on-surface-variant) 50%, transparent 50%); background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; }

  /* ── Hero (ganancia por hora) ──────────────────────────────────────────── */
  .hero {
    padding: 22px 16px; margin: 14px 0;
    border-radius: var(--md-sys-shape-corner-large);
    text-align: center;
  }
  .hero.success { background: var(--md-sys-color-success-container); color: var(--md-sys-color-on-success-container); }
  .hero.error   { background: var(--md-sys-color-error-container);   color: var(--md-sys-color-on-error-container); }
  .hero.neutral { background: var(--md-sys-color-warning-container); color: var(--md-sys-color-on-warning-container); }
  .hero__label {
    font-family: var(--md-sys-typescale-label-font);
    font-weight: 700; font-size: 11px;
    text-transform: uppercase; letter-spacing: 1.2px; opacity: 0.85;
  }
  .hero__big {
    font-family: var(--md-sys-typescale-display-font);
    font-size: 44px; line-height: 1.1; margin: 6px 0;
    font-variant-numeric: tabular-nums;
  }
  .hero__msg { font-size: 13px; font-weight: 600; }

  /* ── Desglose de líneas ────────────────────────────────────────────────── */
  .lines {
    padding: 12px 16px;
    background: var(--md-sys-color-surface);
    border: 1px solid var(--md-sys-color-outline-variant);
    border-radius: var(--md-sys-shape-corner-medium);
    margin: 8px 0 14px;
  }
  .lines .line {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px dashed var(--md-sys-color-outline-variant);
    font-size: 14px; font-weight: 600;
    color: var(--md-sys-color-on-surface);
  }
  .lines .line:last-child { border-bottom: 0; }
  .lines .line .v { font-variant-numeric: tabular-nums; font-weight: 700; }
  .lines .line.total {
    font-family: var(--md-sys-typescale-title-font);
    font-weight: 700; font-size: 17px;
    color: var(--md-sys-color-primary);
    border-top: 2px solid var(--md-sys-color-outline-variant);
    margin-top: 4px; padding-top: 12px;
  }

  /* ── Nota destacada (warning soft) ─────────────────────────────────────── */
  .note {
    padding: 14px 16px;
    background: var(--md-sys-color-warning-container);
    color: var(--md-sys-color-on-warning-container);
    border-radius: var(--md-sys-shape-corner-medium);
    font-size: 13px; line-height: 1.55;
    margin-bottom: 14px;
  }
  .note b { font-weight: 700; }

  /* ── "Pegar receta" details ────────────────────────────────────────────── */
  .paste {
    background: var(--md-sys-color-surface-container);
    border: 1.5px dashed var(--md-sys-color-primary);
    border-radius: var(--md-sys-shape-corner-medium);
    padding: 0 16px;
    margin-bottom: 14px;
  }
  .paste > summary {
    cursor: pointer; list-style: none;
    font-family: var(--md-sys-typescale-label-font);
    font-weight: 700; font-size: 14px;
    color: var(--md-sys-color-primary);
    padding: 14px 0;
  }
  .paste > summary::-webkit-details-marker { display: none; }
  .paste > summary::before { content: '+ '; font-weight: 900; margin-right: 2px; }
  .paste[open] > summary::before { content: '− '; }
  .paste textarea {
    font-family: var(--md-sys-typescale-body-font); font-size: 15px;
    line-height: 1.55;
    width: 100%; min-height: 130px;
    color: var(--md-sys-color-on-surface);
    background: var(--md-sys-color-surface-container-lowest);
    border: 1px solid var(--md-sys-color-outline-variant);
    border-radius: var(--md-sys-shape-corner-small);
    padding: 12px;
    margin-bottom: 10px; resize: vertical;
  }
  .paste__hint { font-size: 12px; color: var(--md-sys-color-on-surface-variant); margin: 0 0 8px; }

  /* ── Simulador inverso ─────────────────────────────────────────────────── */
  .sim {
    margin-top: 16px; padding: 16px;
    background: var(--md-sys-color-surface-container-low);
    border: 1.5px dashed var(--md-sys-color-primary);
    border-radius: var(--md-sys-shape-corner-medium);
  }
  .sim__label {
    display: block;
    font-family: var(--md-sys-typescale-label-font);
    font-weight: 700; font-size: 14px;
    color: var(--md-sys-color-primary);
    margin-bottom: 10px;
  }
  .sim__result {
    margin-top: 12px; text-align: center;
    font-family: var(--md-sys-typescale-body-font);
    font-weight: 700;
    font-size: 20px; color: var(--md-sys-color-primary);
    font-variant-numeric: tabular-nums;
  }
  .sim__result b { font-weight: 400; }

  .gas-out {
    text-align: center; margin-top: 10px;
    font-family: var(--md-sys-typescale-title-font);
    font-size: 18px; font-weight: 700;
    color: var(--md-sys-color-primary);
    font-variant-numeric: tabular-nums;
  }

  /* ── Ingredientes en la receta ─────────────────────────────────────────── */
  .ing-row {
    display: grid;
    grid-template-columns: minmax(0, 1.8fr) minmax(0, 0.9fr) minmax(0, 1fr) auto;
    gap: 6px; align-items: end;
    margin-bottom: 4px;
  }
  .ing-row .md-icon-button {
    width: 44px; height: 44px;
    color: var(--md-sys-color-error);
  }
  .ing-cost {
    font-family: var(--md-sys-typescale-label-font);
    font-weight: 700; font-size: 12px;
    color: var(--md-sys-color-on-surface-variant);
    text-align: right; margin: 2px 6px 10px;
    font-variant-numeric: tabular-nums;
  }

  /* ── Action bar (bottom buttons) ───────────────────────────────────────── */
  .action-bar { display: flex; gap: 10px; margin-top: 18px; }
  .action-bar .md-button { flex: 1; }

  /* ── Modal (overlay + dialog ajustado) ─────────────────────────────────── */
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    background: var(--md-sys-color-scrim);
    backdrop-filter: blur(2px);
    display: none; align-items: flex-end; justify-content: center;
  }
  .overlay.open { display: flex; }

  .md-dialog.modal {
    width: 100%; max-width: 600px; max-height: 92vh;
    overflow-y: auto;
    border-radius: var(--md-sys-shape-corner-extra-large) var(--md-sys-shape-corner-extra-large) 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    background: var(--md-sys-color-surface-container-high);
  }
  @media (min-width: 600px) {
    .overlay { align-items: center; padding: 24px; }

<script type="module">
"use strict";
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ---------- Cliente Supabase ---------- */
const SUPABASE_URL = "https://xmhyjlgihdgjcrdajbys.supabase.co";
const SUPABASE_KEY = "sb_publishable_Z9qimqwsXa_8nSdU_UQLIQ_1tZsllGU";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

/* ---------- Unidades y helpers ---------- */
const UNITS = {
  kg:{fam:'peso',f:1000,lbl:'kg'}, g:{fam:'peso',f:1,lbl:'g'},
  l:{fam:'volumen',f:1000,lbl:'l'}, ml:{fam:'volumen',f:1,lbl:'ml'},
  u:{fam:'unidad',f:1,lbl:'unidad'}
};
const FAM_UNITS = { peso:['kg','g'], volumen:['l','ml'], unidad:['u'] };
const UNIDADES_VENTA = ['unidad','docena','media docena','porción','kilo'];
function pluralUnidad(u, n){
  if(n===1) return u;
  if(u==='media docena') return 'medias docenas';
  if(u.endsWith('ión')) return u.slice(0,-3)+'iones';
  if(/[aeiouáéíóú]$/i.test(u)) return u+'s';
  return u+'es';
}

const moneda = new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0});
const monedaDec = new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:2});
function $(v){ if(!isFinite(v)) return '—'; return Math.abs(v)<100 && v!==0 ? monedaDec.format(v) : moneda.format(v); }
function num(v){ const n=parseFloat(String(v).replace(',','.')); return isFinite(n)?n:0; }
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,6);

/* ---------- Estado + almacenamiento (Supabase: tabla kv) ---------- */
let insumos=[], recetas=[], pedidos=[], config={gasMonto:0, gasTandas:1, pagoRef:0};

async function cargar(k, def){
  const { data, error } = await supabase.from('kv').select('valor').eq('clave', k).maybeSingle();
  if(error){ console.error('cargar('+k+'):', error); toast('Error al cargar '+k); return def; }
  return data ? data.valor : def;
}
async function guardar(k, val){
  const { error } = await supabase.from('kv').upsert({ clave: k, valor: val, actualizado: new Date().toISOString() });
  if(error){ console.error('guardar('+k+'):', error); toast('Error al guardar '+k); }
}
async function guardarTodo(){
  await guardar('insumos',insumos);
  await guardar('recetas',recetas);
  await guardar('config',config);
  await guardar('pedidos',pedidos);
}

/* ---------- Cálculos ---------- */
function costoPorBase(ins){
  const total = num(ins.cantidad)*UNITS[ins.unidad].f;
  return total>0 ? num(ins.costoCompra)/total : 0;
}
function costoIngrediente(ing){
  const ins = insumos.find(i=>i.id===ing.insumoId);
  if(!ins) return 0;
  return num(ing.cantidad)*UNITS[ing.unidad].f * costoPorBase(ins);
}
function gasPorTanda(){ return num(config.gasTandas)>0 ? num(config.gasMonto)/num(config.gasTandas) : 0; }

function calcular(r){
  const cInsumos = (r.ingredientes||[]).reduce((s,ing)=>s+costoIngrediente(ing),0);
  const cGas = gasPorTanda()*(num(r.tandas)||0);
  const cTotal = cInsumos + cGas;
  const rinde = num(r.rinde);
  const cUnidad = rinde>0 ? cTotal/rinde : 0;
  const ingreso = num(r.precio)*rinde;
  const ganancia = ingreso - cTotal;
  const horas = num(r.horas);
  const porHora = horas>0 ? ganancia/horas : null;
  return {cInsumos,cGas,cTotal,cUnidad,ingreso,ganancia,horas,porHora,rinde};
}

/* ---------- Render principal ---------- */
let vistaActual='proximos';
const vista=document.getElementById('vista');

function setTab(v){
  vistaActual=v;
  // Sólo las 4 tabs principales se marcan como activas; en submenús, "Más" queda activa.
  const tabsPrincipales = ['proximos','pedidos','stock','mas'];
  const tabResaltada = tabsPrincipales.includes(v) ? v : 'mas';
  document.querySelectorAll('.nav-item').forEach(t=>t.classList.toggle('active', t.dataset.vista===tabResaltada));
  render();
  window.scrollTo({top:0});
}
document.querySelectorAll('.nav-item').forEach(t=>t.addEventListener('click',()=>setTab(t.dataset.vista)));

function render(){
  if(vistaActual==='proximos') renderProximos();
  else if(vistaActual==='pedidos') renderPedidos();
  else if(vistaActual==='stock') renderStock();
  else if(vistaActual==='mas') renderMas();
  else if(vistaActual==='recetas') renderRecetas();
  else if(vistaActual==='productos') renderProductos();
  else if(vistaActual==='insumos') renderInsumos();
  else renderAjustes();
}

/* ---------- Helpers de fecha ---------- */
function isoLocalHoy(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function diasEntreISO(iso1, iso2){
  if(!iso1 || !iso2) return null;
  const d1 = new Date(iso1+'T00:00:00');
  const d2 = new Date(iso2+'T00:00:00');
  return Math.round((d2-d1)/(1000*60*60*24));
}
function fmtFechaRelativa(iso){
  if(!iso) return 'Sin fecha';
  const diff = diasEntreISO(isoLocalHoy(), iso);
  if(diff===0) return 'Hoy';
  if(diff===1) return 'Mañana';
  if(diff===-1) return 'Ayer';
  if(diff>=2 && diff<=6){
    const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const d = new Date(iso+'T00:00:00');
    const [, m, dd] = iso.split('-');
    return `${dias[d.getDay()]} ${dd}/${m}`;
  }
  const [, m, dd] = iso.split('-');
  return `${dd}/${m}`;
}
function urgenciaPedido(p){
  if(!p.fechaEntrega || p.estado==='entregado') return 'normal';
  const diff = diasEntreISO(isoLocalHoy(), p.fechaEntrega);
  if(diff===null) return 'normal';
  if(diff<0) return 'vencido';
  if(diff<=1) return 'urgente';
  return 'normal';
}
function totalPedidoCalc(p){
  return (p.items||[]).reduce((s,it)=>s+num(it.cantidad)*num(it.precio),0);
}

/* ---------- Header de sección con botón Volver ---------- */
function backHeader(titulo){
  return `<div class="seccion-header">
    <button class="back-mas" type="button" onclick="setTab('mas')">
      <span class="material-symbols-rounded">arrow_back</span> Volver
    </button>
    <h2 class="seccion-title">${esc(titulo)}</h2>
  </div>`;
}
function tituloSeccion(titulo){
  return `<h2 class="seccion-title seccion-title--solo">${esc(titulo)}</h2>`;
}

/* ----- Vista Próximos (Hoy + Mañana) ----- */
function fechaLargaDe(iso){
  const d = new Date(iso+'T00:00:00');
  const dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]}`;
}
function isoMasDias(n){
  const d = new Date();
  d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function resumenProduccionDe(listaPedidos){
  const m = new Map();
  listaPedidos.forEach(p=>{
    if(p.estado==='entregado') return;
    (p.items||[]).forEach(it=>{
      const r = recetas.find(x=>x.id===it.recetaId); if(!r) return;
      const por = unidadesPorVenta(r.unidadVenta||'unidad');
      const cant = num(it.cantidad) * por;
      const slot = m.get(it.recetaId) || {nombre:r.nombre, cant:0, stock:r.stock||0};
      slot.cant += cant;
      m.set(it.recetaId, slot);
    });
  });
  return m;
}
function bloqueDia(titulo, fechaIso, pedidosDelDia, opts){
  const aCobrar = pedidosDelDia.filter(p=>!p.pagado).reduce((s,p)=>s+totalPedidoCalc(p), 0);
  const produccion = resumenProduccionDe(pedidosDelDia);

  let html = `<h2 class="dia-title">${titulo} <span class="dia-title__sub">· ${fechaLargaDe(fechaIso)}</span></h2>`;

  html += `<div class="md-card outlined section hoy-card">
    <h3 class="hoy-section">📦 Entregás</h3>`;
  if(pedidosDelDia.length===0){
    html += `<p class="hoy-empty-msg">Nada para entregar.</p>`;
  } else {
    html += `<div class="pedidos-cards-wrap">${pedidosDelDia.map(renderPedidoCard).join('')}</div>`;
  }
  html += `</div>`;

  if(opts && opts.mostrarHero && aCobrar>0){
    html += `<div class="hero success" style="margin:14px 0">
      <div class="hero__label">Cobrás ${titulo.toLowerCase()}</div>
      <div class="hero__big">${$(aCobrar)}</div>
      <div class="hero__msg">De los pedidos sin pagar</div>
    </div>`;
  }

  if(produccion.size){
    html += `<div class="md-card outlined section hoy-card">
      <h3 class="hoy-section">🥧 Producir</h3>
      <ul class="hoy-prod">${Array.from(produccion.values()).map(s=>{
        const tras = s.stock>0 ? ` <small style="color:var(--md-sys-color-on-surface-variant); font-weight:600">(tenés ${s.stock} en stock)</small>` : '';
        return `<li><b>${s.cant}</b> ${esc(s.nombre)}${tras}</li>`;
      }).join('')}</ul>
    </div>`;
  }
  return html;
}
function renderProximos(){
  const hoy = isoLocalHoy();
  const manana = isoMasDias(1);
  const pedidosVencidos = pedidos.filter(p=>p.fechaEntrega && p.fechaEntrega<hoy && p.estado!=='entregado');
  const pedidosHoy = pedidos.filter(p=>p.fechaEntrega===hoy && p.estado!=='entregado');
  const pedidosManana = pedidos.filter(p=>p.fechaEntrega===manana && p.estado!=='entregado');

/* ----- Toggle pagado del pedido ----- */
async function ciclarPagoPedido(id, ev){
  if(ev) ev.stopPropagation();
  const p = pedidos.find(x=>x.id===id); if(!p) return;
  p.pagado = !p.pagado;
  await guardarTodo();
  render();
  toast(p.pagado ? 'Marcado como pagado' : 'Marcado como por cobrar');
}

/* ----- Ciclar estado del pedido (Pendiente → Listo → Entregado) ----- */
async function ciclarEstadoPedido(id, ev){
  if(ev) ev.stopPropagation();
  const p = pedidos.find(x=>x.id===id); if(!p) return;
  const orden = ['pendiente','listo','entregado'];
  const idxAct = orden.indexOf(p.estado);
  const eraEntregado = p.estado==='entregado' && p.stockDescontado;
  const nuevo = orden[(idxAct+1) % orden.length];
  p.estado = nuevo;
  if(nuevo==='entregado' && !eraEntregado){
    ajustarStockPedido(p, -1);
    p.stockDescontado = true;
  } else if(nuevo!=='entregado' && eraEntregado){
    ajustarStockPedido(p, +1);
    p.stockDescontado = false;
  }
  await guardarTodo();
  render();
  const meta = estadoMeta(nuevo);
  toast(`Marcado como ${meta.lbl}`);
}

const ESTADOS = [
  {v:'pendiente', lbl:'Pendiente', tono:'neutral'},
  {v:'listo',     lbl:'Listo',     tono:'success'},
  {v:'entregado', lbl:'Entregado', tono:'success'}
];
function estadoMeta(v){ return ESTADOS.find(e=>e.v===v) || ESTADOS[0]; }
function fmtFecha(iso){
  if(!iso) return 'Sin fecha';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}`;
}
function waLink(celular){
  if(!celular) return null;
  const raw = String(celular).trim();
  let s = raw.replace(/\D/g,'');
  if(!s) return null;
  if(raw.startsWith('+')) return `https://wa.me/${s}`;
  if(s.startsWith('0')) s = s.slice(1);
  if(!s.startsWith('54')){
    if(!s.startsWith('9')) s = '9' + s;
    s = '54' + s;
  }
  return `https://wa.me/${s}`;
}
function resumenProduccion(){
  // Por receta: stock atómico disponible, a producir (pendientes) y a entregar (listos), todo en UNIDADES ATÓMICAS
  const m = new Map();
  recetas.forEach(r=>{
    m.set(r.id, {
      recetaId: r.id, nombre: r.nombre,
      uv: r.unidadVenta||'unidad',
      por: unidadesPorVenta(r.unidadVenta||'unidad'),
      stock: r.stock||0,
      aProducir: 0, porEntregar: 0
    });
  });
  pedidos.forEach(p=>{
    if(p.estado==='entregado') return;
    (p.items||[]).forEach(it=>{
      const slot = m.get(it.recetaId); if(!slot) return;
      const cant = num(it.cantidad) * slot.por; // a unidades atómicas
      if(p.estado==='listo') slot.porEntregar += cant;
      else slot.aProducir += cant;
    });
  });
  return Array.from(m.values())
    .map(s=>({...s, faltaHacer: Math.max(0, s.aProducir - s.stock)}))
    .filter(s=>s.aProducir>0 || s.porEntregar>0 || s.stock>0);
}
function renderPedidos(){

  </button></div>`;
  const resumen = resumenProduccion();
  if(resumen.length){
    html += `<div class="md-card outlined section" style="padding:14px 16px">
      <h3 style="margin:0 0 4px 0; font-size:13px; text-transform:uppercase; letter-spacing:0.6px; color:var(--md-sys-color-on-surface-variant)">Resumen de producción</h3>
      <p class="hint" style="margin:0 0 10px">Todo en unidades. "Te falta" = lo que te pidieron menos lo que ya tenés.</p>
      <div class="prod-tbl-wrap" style="border:none; background:transparent; --th-sticky:60px">
        <table class="prod-tbl"><thead><tr>
          <th>Producto</th>
          <th class="num">Te falta</th>
          <th class="num">Tenés</th>
          <th class="num">Te pidieron</th>
        </tr></thead><tbody>` +
        resumen.map(s=>{
          const stockLbl = s.stock>0 ? `${s.stock} u` : '—';
          const prodLbl = s.aProducir>0 ? `${s.aProducir} u` : '—';
          const faltaCls = s.faltaHacer===0 ? 'status success' : 'status neutral';
          const faltaLbl = s.aProducir===0 ? '—' : `<span class="md-chip ${faltaCls}">${s.faltaHacer} u</span>`;
          return `<tr><td><div class="prod-tbl__name">${esc(s.nombre)}</div></td>
            <td class="num">${faltaLbl}</td>
            <td class="num">${stockLbl}</td>
            <td class="num">${prodLbl}</td></tr>`;
        }).join('') +
      `</tbody></table></div></div>`;
  }
  if(pedidos.length===0){
    html += `<div class="md-card outlined section">
      <div class="empty">
        <span class="material-symbols-rounded">receipt_long</span>
        <p class="empty-title">No hay pedidos cargados</p>
        <small>Tocá "Nuevo pedido" para anotar lo que te encargaron, con cliente, fecha de entrega y productos.</small>
      </div>
    </div>`;
  } else {
    const ordenados = [...pedidos].sort((a,b)=>{
      const ord = {pendiente:0, listo:1, entregado:2};
      if(ord[a.estado]!==ord[b.estado]) return ord[a.estado]-ord[b.estado];
      return (a.fechaEntrega||'').localeCompare(b.fechaEntrega||'');
    });
    const cards = ordenados.map(renderPedidoCard).join('');
    html += `<h3 class="section-title">Pedidos cargados</h3>
    <div class="pedidos-cards-wrap" style="display:flex">${cards}</div>`;
  }
  vista.innerHTML=html;
}

function ajustarStockPedido(p, signo){
  // signo=-1 descuenta, signo=+1 reintegra. Convierte a unidades atómicas.
  (p.items||[]).forEach(it=>{
    const r = recetas.find(x=>x.id===it.recetaId); if(!r) return;
    const por = unidadesPorVenta(r.unidadVenta||'unidad');
    r.stock = (r.stock||0) + signo * num(it.cantidad) * por;
  });
}
async function guardarPedido(){
  const p = edPCache;
  p.cliente = (p.cliente||'').trim();
  if(!p.cliente){ toast('Ponele el nombre del cliente 🙂'); return; }
  p.items = (p.items||[]).filter(it=>it.recetaId && num(it.cantidad)>0);

  // Lógica de stock al guardar: descuento automático al entregar, reintegro al revertir.
  const eraEntregado = edPCacheOrig.estado==='entregado' && edPCacheOrig.stockDescontado;
  const esEntregado  = p.estado==='entregado';
  let mensajeStock = '';
  if(esEntregado && !eraEntregado){
    ajustarStockPedido(p, -1);
    p.stockDescontado = true;
    mensajeStock = ' · stock actualizado';
  } else if(!esEntregado && eraEntregado){
    ajustarStockPedido(p, +1);
    p.stockDescontado = false;
    mensajeStock = ' · stock reintegrado';
  }

  const idx = pedidos.findIndex(x=>x.id===p.id);
  if(idx===-1) pedidos.push(p); else pedidos[idx]=p;
  await guardarTodo(); cerrar(); render(); toast('Pedido guardado ✓'+mensajeStock);
}
async function borrarPedido(id){
  if(!confirm('¿Borrar este pedido?')) return;
  const idx = pedidos.findIndex(x=>x.id===id);
  if(idx===-1) return;
  const snap = JSON.parse(JSON.stringify(pedidos[idx]));
  // Si estaba entregado y tenía stock descontado, reintegrar al borrar.
  if(snap.estado==='entregado' && snap.stockDescontado){
    ajustarStockPedido(snap, +1);
  }
  pedidos.splice(idx, 1);
  await guardarTodo(); cerrar(); render();
  toastUndo('Pedido borrado', async ()=>{
    // Restaurar tal cual estaba, deshaciendo el reintegro de stock si correspondía.
    if(snap.estado==='entregado' && snap.stockDescontado){
      ajustarStockPedido(snap, -1);
    }
    pedidos.splice(Math.min(idx, pedidos.length), 0, snap);
    await guardarTodo(); render(); toast('Pedido restaurado');
  });
}

function norm(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim(); }
function capitalizar(s){ s=s.trim(); return s ? s.charAt(0).toUpperCase()+s.slice(1) : s; }
const PISTA_LIQUIDO=/(esenc|escenc|aceite|leche|agua|vinagre|miel|jugo|crema|licor|ron|coñac|conac|vino|colorante|jarabe|almibar|extracto)/;
function familiaPorNombre(nombre){ return PISTA_LIQUIDO.test(norm(nombre)) ? 'volumen' : 'peso'; }
function clasifUnidad(uw){
  if(/^(g|gr|grs|gramo|gramos)$/.test(uw)) return 'g';
  if(/^(kg|kilo|kilos|kilogramo|kilogramos)$/.test(uw)) return 'kg';
  if(/^(ml|cc|mililitro|mililitros)$/.test(uw)) return 'ml';
  if(/^(l|lt|lts|litro|litros)$/.test(uw)) return 'l';
  if(/^(u|unidad|unidades)$/.test(uw)) return 'u';
  if(/^(cucharada|cucharadas|cucharadita|cucharaditas|cda|cdas|cdta|cdtas|taza|tazas|pizca|pizcas|chorro|chorrito|gota|gotas)$/.test(uw)) return 'IGNORAR';
  return '';
}
function parseLinea(raw){
  let s = raw.replace(/^[\s*\-–—•·]+/,'').trim().replace(/\.+\s*$/,'').trim();
  let cantidad='', unidad='', nombre='';
  const num = s.match(/(\d+(?:[.,]\d+)?)/);
  if(num){
    const numero = num[1].replace(',','.');
    const idx = num.index;
    const before = s.slice(0, idx).trim();
    let after = s.slice(idx + num[0].length).trim();
    const um = after.match(/^([a-záéíóúñ]+)\.?\b\s*(.*)$/i);
    const uw = um ? um[1].toLowerCase() : '';
    const cls = clasifUnidad(uw);
    if(cls === 'IGNORAR'){ after = um[2]; }
    else if(cls){ unidad = cls; cantidad = numero; after = um[2]; }
    else { unidad = 'u'; cantidad = numero; }
    let resto = (before + ' ' + after).replace(/[:;]/g,' ').replace(/\s+/g,' ').trim();
    resto = resto.replace(/^[,\-–—\s]+|[,\-–—\s]+$/g,'').replace(/^de(l)?\s+/i,'').trim();
    if(!resto) resto = (before || after || s).replace(/[:;]/g,' ').replace(/\s+/g,' ').trim();
    nombre = resto;
  } else {
    nombre = s;
  }
  nombre = nombre.replace(/[:.,;]+\s*$/,'').replace(/^[:.,;]+\s*/,'').trim();
  nombre = capitalizar(nombre);
  const fam = unidad ? UNITS[unidad].fam : familiaPorNombre(nombre);
  const compraUnidad = fam==='peso'?'kg':fam==='volumen'?'l':'u';
  return {cantidad, unidad, nombre, compraUnidad, fam};
}
const STOP=/(^|\s)(de|del|la|el|los|las|en|con|para|al|y|a|rallad[oa]|molid[oa]|picad[oa]|fresc[oa]|comun|comunes|gramo|gramos|gr|grs|kilo|kilos|kg|ml|cc|mililitro|mililitros|litro|litros|lt|lts|unidad|unidades|cucharada|cucharadas|cucharadita|cucharaditas|cda|cdas|cdta|cdtas|taza|tazas|pizca|pizcas|chorro|chorrito|gota|gotas|mediano|medianos|mediana|medianas|grande|grandes|chico|chicos|chica|chicas|repostero|reposter[oa])(\s|$)/g;
function clavesNombre(n){
  return norm(n)
    .replace(/[:.,;()]/g,' ')
    .replace(/\b\d+(?:[.,]\d+)?\b/g,' ')
    .replace(STOP,' ')
    .split(/\s+/).filter(w=>w.length>2);
}
function buscarInsumo(nombre){
  const exacto=insumos.find(i=>norm(i.nombre)===norm(nombre));
  if(exacto) return exacto;
  const claves=clavesNombre(nombre);
  if(!claves.length) return null;
  return insumos.find(i=>{ const ic=clavesNombre(i.nombre); return claves.some(c=>ic.includes(c)); }) || null;
}
async function parsearReceta(){
  const ta=document.getElementById('r-paste'); if(!ta) return;
  const lineas=ta.value.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  if(!lineas.length){ toast('Pegá la lista primero 🙂'); return; }
  let creados=0;
  lineas.forEach(l=>{
    const p=parseLinea(l);
    let ins=buscarInsumo(p.nombre);
    if(!ins){ ins={id:uid(),nombre:p.nombre,costoCompra:0,cantidad:1,unidad:p.compraUnidad}; insumos.push(ins); creados++; }
    const fam=UNITS[ins.unidad].fam;
    let u = (p.unidad && FAM_UNITS[fam].includes(p.unidad)) ? p.unidad : FAM_UNITS[fam][FAM_UNITS[fam].length-1];
    edRCache.ingredientes.push({insumoId:ins.id, cantidad:p.cantidad, unidad:u});
  });
  await guardarTodo();
  refrescarReceta();
  toast(creados ? `Cargué ${lineas.length} ingredientes · ${creados} insumos nuevos sin precio` : `Cargué ${lineas.length} ingredientes ✓`);
}
function campoR(c,v){ edRCache[c]=v; refrescarSoloResultados(); }
function cambioUnidadVenta(v){
  edRCache.unidadVenta = v;
  const lblPrecio = modal.querySelector('label[for="r-precio"]');
  if(lblPrecio) lblPrecio.textContent = `Precio por ${v}`;
  const lines = modal.querySelectorAll('.lines .line span:first-child');
  if(lines.length>=4) lines[3].textContent = `Costo por ${v}`;
}

function refrescarReceta(){
  const scroll=modal.scrollTop; dibujarReceta(false); modal.scrollTop=scroll;
}
function refrescarSoloResultados(){
  const r=edRCache, c=calcular(r), tono=tonoHora(c.porHora);
  const hero=modal.querySelector('.hero'); const des=modal.querySelector('.lines');
  if(des){ const vs=des.querySelectorAll('.v'); vs[0].textContent=$(c.cInsumos);vs[1].textContent=$(c.cGas);vs[2].textContent=$(c.cTotal);vs[3].textContent=$(c.cUnidad);vs[4].textContent=$(c.ingreso);vs[5].textContent=$(c.ganancia); }
  if(hero){ hero.className='hero '+tono; hero.querySelector('.hero__big').textContent=c.porHora===null?'—':$(c.porHora);
    let msg; if(c.porHora===null)msg='Cargá las horas para ver tu ganancia por hora'; else if(c.porHora<0)msg='⚠️ A este precio estás perdiendo plata'; else if(num(config.pagoRef)>0&&c.porHora<num(config.pagoRef))msg='Te paga menos de lo que querés por hora'; else msg='¡Bien! Te queda esto por cada hora de trabajo';
    hero.querySelector('.hero__msg').textContent=msg; }
}
function simular(v){
  const obj=num(v); const r=edRCache; const c=calcular(r); const out=document.getElementById('sim-res');
  if(obj<=0||c.rinde<=0){ out.textContent='Escribí un monto y te digo el precio'; return; }
  const precio=(c.cTotal+obj*num(r.horas))/c.rinde;
  out.innerHTML=`Vendé cada ${r.unidadVenta||'unidad'} a <b>${$(precio)}</b>`;
}
async function guardarReceta(){
  const r=edRCache; r.nombre=(r.nombre||'').trim();
  if(!r.nombre){toast('Ponele un nombre a la receta 🙂');return;}
  const idx = recetas.findIndex(x=>x.id===r.id);
  if(idx===-1) recetas.push(r); else recetas[idx]=r;
  await guardarTodo(); cerrar(); render(); toast('Receta guardada ✓');
}
async function borrarReceta(id){ if(!confirm('¿Borrar esta receta?'))return; recetas=recetas.filter(x=>x.id!==id); await guardarTodo(); cerrar(); render(); toast('Receta borrada'); }

/* ---------- Util ---------- */
function cerrar(){ overlay.classList.remove('open'); }
let _downEnOverlay=false;
overlay.addEventListener('mousedown',e=>{ _downEnOverlay = (e.target===overlay); });
overlay.addEventListener('click',e=>{ if(e.target===overlay && _downEnOverlay) cerrar(); });
// Enter guarda el modal abierto (salvo en textarea/select, donde Enter tiene su uso propio)
overlay.addEventListener('keydown',e=>{
  if(e.key!=='Enter' || e.shiftKey) return;
  const t=e.target.tagName;
  if(t==='TEXTAREA' || t==='SELECT') return;
  const btn=modal.querySelector('.md-button.filled');
  if(btn){ e.preventDefault(); btn.click(); }
});
function esc(s){ return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
let toastT;
let undoFn = null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  undoFn = null;
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2400);
}
function toastUndo(msg, fn){
  const t = document.getElementById('toast');
  t.innerHTML = `<span>${esc(msg)}</span><button class="toast-undo" type="button" onclick="hacerUndo()">Deshacer</button>`;
  t.classList.add('show');
  undoFn = fn;
  clearTimeout(toastT);
  toastT = setTimeout(()=>{ t.classList.remove('show'); undoFn = null; }, 5000);
}
function hacerUndo(){
  if(undoFn){ const fn = undoFn; undoFn = null; fn(); }
  document.getElementById('toast').classList.remove('show');
  clearTimeout(toastT);
}

/* ---------- Insumos precargados (solo en el primer arranque) ---------- */
const SEED_INSUMOS=[
  {id:'seed-dulce',   nombre:'Dulce de Leche',     costoCompra:44000, cantidad:10, unidad:'kg'},
  {id:'seed-coco',    nombre:'Coco Rallado',       costoCompra:38428, cantidad:5,  unidad:'kg'},
  {id:'seed-maicena', nombre:'Maicena',            costoCompra:8.63,  cantidad:5,  unidad:'kg'},
  {id:'seed-harina',  nombre:'Harina',             costoCompra:2000,  cantidad:1,  unidad:'kg'},
  {id:'seed-azucar',  nombre:'Azúcar',             costoCompra:1600,  cantidad:1,  unidad:'kg'},
  {id:'seed-manteca', nombre:'manteca',            costoCompra:72411, cantidad:5,  unidad:'kg'},
  {id:'seed-vainilla',nombre:'Escencia Vainilla',  costoCompra:5400,  cantidad:1,  unidad:'l'},
  {id:'seed-polvo',   nombre:'Polvo para hornear', costoCompra:16300, cantidad:3,  unidad:'kg'},
  {id:'seed-huevos',  nombre:'huevos',             costoCompra:7000,  cantidad:30, unidad:'u'}
];

/* ---------- Sesión y arranque ---------- */
async function iniciarApp(){
  const si = await cargar('insumos', null);
  if(si===null){ insumos = SEED_INSUMOS.slice(); await guardar('insumos', insumos); }
  else insumos = si;
  recetas = await cargar('recetas',[]);
  recetas.forEach(r=>{ if(typeof r.stock!=='number') r.stock = 0; });
  pedidos = await cargar('pedidos',[]);
  pedidos.forEach(p=>{ if(typeof p.stockDescontado!=='boolean') p.stockDescontado = false; });
  config  = await cargar('config',{gasMonto:0,gasTandas:1,pagoRef:0});
  render();
}

async function iniciarSesion(ev){
  ev.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  err.textContent = '';
  btn.disabled = true;
  try{
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if(error) throw error;
    await mostrarApp();
  }catch(e){
    err.textContent = (e.message === 'Invalid login credentials')
      ? 'Email o contraseña incorrectos'
      : (e.message || 'No se pudo entrar');
  }finally{
    btn.disabled = false;
  }
}

async function cerrarSesion(){
  if(!confirm('¿Cerrar sesión?')) return;
  await supabase.auth.signOut();
  insumos = []; recetas = []; config = {gasMonto:0, gasTandas:1, pagoRef:0};
  mostrarLogin();
}

function mostrarLogin(){
  document.getElementById('login-screen').hidden = false;
  document.getElementById('app').hidden = true;
  setTimeout(()=>document.getElementById('login-email').focus(), 50);
}
async function mostrarApp(){
  document.getElementById('login-screen').hidden = true;
  document.getElementById('app').hidden = false;
  await iniciarApp();
}

/* Exponer al window las funciones que llaman los onclick inline (innerHTML) */
Object.assign(window, {
  iniciarSesion, cerrarSesion,
  abrirInsumo, guardarInsumo, borrarInsumo,
  abrirReceta, guardarReceta, borrarReceta, parsearReceta,
  agregarIng, quitarIng, setIngCant, setIngUnidad, setIngInsumo,
  campoR, cambioUnidadVenta, simular, cerrar, guardarAjustes,
  abrirPedido, guardarPedido, borrarPedido,
  campoP, agregarItemPedido, quitarItemPedido, setItemReceta, setItemCantidad, setItemPrecio,
  ajustarStock, setStock,
  setTab, ciclarEstadoPedido, ciclarPagoPedido, hacerUndo
});

/* Boot: ¿hay sesión guardada? Si sí, arranco la app. Si no, login. */
(async function boot(){
  const { data: { session } } = await supabase.auth.getSession();
  if(session) await mostrarApp();
  else mostrarLogin();
})();
</script>
